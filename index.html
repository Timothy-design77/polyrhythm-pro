function gridSlots(meter,sub){return meter.num*sub}

  var gs=gridSlots(meter,sub),a=new Array(gs).fill(1),pos=0;
  for(var g=0;g<meter.grp.length;g++){var si=pos*sub;a[si]=g===0?3:2;pos+=meter.grp[g]}
  return a;
}
function grpBoundaries(meter,sub){
  var b=[],pos=0;
  for(var g=0;g<meter.grp.length;g++){b.push(pos*sub);pos+=meter.grp[g]}
  return b;
}

            h('div',{style:{fontSize:12,fontWeight:700,color:'#888'}},p.name),
            h('div',{style:{fontSize:10,color:'#333',marginTop:2}},p.bpm+' BPM \u00B7 '+(p.meter?p.meter.n:''))),
          h('button',{onClick:function(){setSPresets(function(pr){return pr.filter(function(_,j){return j!==i})})},
            style:{padding:'0 12px',background:'#111',border:'1px solid #1a1a1a',borderRadius:12,color:'#ff6666',fontSize:14}},'\u00D7'))}):
        h('div',{style:{textAlign:'center',padding:32,color:'#222',fontSize:11}},'Save your current setup above')),

      // ===== HISTORY TAB =====
      tab==='history'&&h('div',{style:{padding:16}},
        curSess?h('div',null,
          h('button',{onClick:function(){setCurSess(null)},style:{fontSize:10,color:'#444',background:'none',border:'none',marginBottom:12,fontFamily:'inherit'}},'\u2190 All sessions'),
          // Big accuracy
          h('div',{style:{textAlign:'center',marginBottom:20}},
            h('div',{style:{fontSize:56,fontWeight:900,color:curSess.goodPct>=70?'rgba(200,255,200,0.8)':curSess.goodPct>=40?'rgba(255,255,200,0.8)':'rgba(255,200,200,0.8)'}},curSess.goodPct+'%'),
            h('div',{style:{fontSize:10,color:'#444',fontWeight:600,letterSpacing:2}},'\u00B125ms ACCURACY')),
          // Stats grid
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}},
            h('div',{style:{background:'#111',borderRadius:10,padding:'12px 8px',textAlign:'center'}},
              h('div',{style:{fontSize:16,fontWeight:800,color:'rgba(200,255,200,0.7)'}},curSess.perfectPct+'%'),
              h('div',{style:{fontSize:7,color:'#333',fontWeight:700,letterSpacing:1}},'PERFECT')),
            h('div',{style:{background:'#111',borderRadius:10,padding:'12px 8px',textAlign:'center'}},
              h('div',{style:{fontSize:16,fontWeight:800,color:'#666'}},curSess.totalHits),
              h('div',{style:{fontSize:7,color:'#333',fontWeight:700,letterSpacing:1}},'HITS')),
            h('div',{style:{background:'#111',borderRadius:10,padding:'12px 8px',textAlign:'center'}},
              h('div',{style:{fontSize:16,fontWeight:800,color:curSess.avgDelta>0?'rgba(255,200,200,0.7)':'rgba(200,220,255,0.7)'}},
                (curSess.avgDelta>0?'+':'')+curSess.avgDelta+'ms'),
              h('div',{style:{fontSize:7,color:'#333',fontWeight:700,letterSpacing:1}},curSess.avgDelta>0?'LATE':'EARLY'))),
          // Session info
          h('div',{style:{textAlign:'center',fontSize:10,color:'#333',marginBottom:16}},
            curSess.bpm+' BPM \u00B7 '+curSess.meter+(curSess.sub>1?' \u00B7 \u00F7'+curSess.sub:'')+
            (curSess.instrument?' \u00B7 \uD83C\uDFB5 '+curSess.instrument:'')),
          // Audio playback
          recUrl&&h('div',{style:{background:'#111',borderRadius:14,padding:14,marginBottom:12}},
            h('div',{style:Object.assign({},LBL,{display:'flex',justifyContent:'space-between'})},
              h('span',null,'RECORDING'),
              h('a',{href:recUrl,download:'recording-'+curSess.id+'.webm',style:{fontSize:8,color:'#444',textDecoration:'none'}},'\u2B07 Download')),
            h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
              h('button',{onClick:playbackAudio,style:{width:36,height:36,borderRadius:'50%',background:playingBack?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.06)',border:'1px solid #222',display:'flex',alignItems:'center',justifyContent:'center'}},
                playingBack?h('div',{style:{width:10,height:10,borderRadius:1,background:'#ccc'}}):
                h('div',{style:{width:0,height:0,borderStyle:'solid',borderWidth:'6px 0 6px 11px',borderColor:'transparent transparent transparent #ccc',marginLeft:2}})),
              h('div',{style:{flex:1,height:2,background:'#1a1a1a',borderRadius:1}}))),
          // Histogram
          h('div',{style:{background:'#111',borderRadius:14,padding:14,marginBottom:12}},
            h('div',{style:LBL},'DISTRIBUTION'),
            h('canvas',{ref:histCvRef,style:{width:'100%',height:100,display:'block'}})),
          // Drift
          curSess.onsets&&curSess.onsets.length>5&&h('div',{style:{background:'#111',borderRadius:14,padding:14}},
            h('div',{style:LBL},'DRIFT'),
            h('canvas',{ref:driftCvRef,style:{width:'100%',height:70,display:'block'}}))
        ):sessions.length>0?h('div',null,
          h('div',{style:LBL},'RECENT SESSIONS'),
          sessions.slice().reverse().slice(0,30).map(function(s,i){return h('button',{key:i,onClick:function(){setCurSess(s)},
            style:{width:'100%',padding:14,borderRadius:12,border:'1px solid #1a1a1a',background:'#111',textAlign:'left',marginBottom:8,display:'block'}},
            h('div',{style:{display:'flex',justifyContent:'space-between'}},
              h('span',{style:{fontSize:16,fontWeight:800,color:s.goodPct>=70?'rgba(200,255,200,0.7)':s.goodPct>=40?'rgba(255,255,200,0.7)':'rgba(255,200,200,0.7)'}},s.goodPct+'%'),
              h('span',{style:{fontSize:10,color:'#333'}},s.totalHits+' hits')),
            h('div',{style:{fontSize:10,color:'#333',marginTop:4}},
              s.bpm+' BPM \u00B7 '+(s.meter||'4/4')+(s.instrument?' \u00B7 '+s.instrument:'')+' \u00B7 '+new Date(s.date).toLocaleDateString()))}))
        :h('div',{style:{textAlign:'center',padding:'60px 20px'}},
          h('div',{style:{fontSize:40,color:'#1a1a1a'}},'\u25CE'),
          h('div',{style:{fontSize:13,fontWeight:700,color:'#333',marginTop:16}},'No sessions yet'),
          h('div',{style:{fontSize:11,color:'#222',marginTop:6}},'Tap REC to start'))
      )
    ),

    // --- FLOATING BAR ---
    h('div',{style:{position:'absolute',bottom:0,left:0,right:0,display:'flex',justifyContent:'center',
      paddingBottom:'max(12px,env(safe-area-inset-bottom,12px))',paddingTop:8,
      background:'linear-gradient(transparent, rgba(10,10,10,0.92) 30%, #0a0a0a)',pointerEvents:'none'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:16,padding:'8px 8px 8px 20px',
        borderRadius:40,background:'rgba(18,18,18,0.96)',border:'1px solid #222',
        backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',pointerEvents:'auto'}},
        h('button',{onClick:togglePlay,style:{width:52,height:52,borderRadius:'50%',border:'none',
          background:playing?'rgba(255,255,255,0.1)':'#e8e8e8',
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
          playing?h('div',{style:{width:16,height:16,borderRadius:2,background:'#e8e8e8'}}):
          h('div',{style:{width:0,height:0,borderStyle:'solid',borderWidth:'9px 0 9px 16px',borderColor:'transparent transparent transparent #0a0a0a',marginLeft:2}})),
        h('div',{style:{textAlign:'center',minWidth:50}},
          h('div',{style:{fontSize:20,fontWeight:800,color:'#e0e0e0',lineHeight:1}},trnOn&&playing?tbRef.current:bpm),
          h('div',{style:{fontSize:7,fontWeight:600,color:'#444',letterSpacing:2}},'BPM')),
        h('button',{onClick:toggleRec,style:{width:52,height:52,borderRadius:'50%',flexShrink:0,
          background:isRec?'rgba(255,40,40,0.15)':'rgba(255,255,255,0.04)',
          border:isRec?'2px solid rgba(255,60,60,0.4)':'2px solid #2a2a2a',
          display:'flex',alignItems:'center',justifyContent:'center'}},
          isRec?h('div',{style:{width:16,height:16,borderRadius:2,background:'#ff5555'}}):
          h('div',{style:{width:18,height:18,borderRadius:'50%',background:'#ff4444'}}))))
  );
}
ReactDOM.render(React.createElement(App),document.getElementById('root'));
// PWA Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
</script>
</body>
</html>
